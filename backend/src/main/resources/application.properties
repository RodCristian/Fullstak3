spring.application.name=backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:h2:file:./data/medicare-db;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Santiago

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.notifications.mail-enabled=${APP_MAIL_ENABLED:false}
app.notifications.from=${APP_MAIL_FROM:no-reply@navycare.local}
app.notifications.admin-email=${APP_ADMIN_EMAIL:admin@navycare.local}

app.calendar.enabled=${APP_GOOGLE_CALENDAR_ENABLED:false}
app.calendar.calendar-id=${APP_GOOGLE_CALENDAR_ID:primary}
app.calendar.service-account-key-path=${APP_GOOGLE_CALENDAR_SERVICE_ACCOUNT_KEY_PATH:}
app.calendar.time-zone=${APP_GOOGLE_CALENDAR_TIMEZONE:America/Santiago}

app.security.demo-admin-email=${APP_ADMIN_USER:admin@navycare.local}
app.security.demo-admin-password=${APP_ADMIN_PASSWORD:Admin123!}
app.security.demo-doctor-password=${APP_DOCTOR_PASSWORD:Doctor123!}
